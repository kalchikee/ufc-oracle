name: Fight Night Predictions

on:
  schedule:
    # Saturdays at 2 PM ET (18:00 UTC) — final predictions before main card
    # UFC events are almost always Saturday nights (main card ~10 PM ET)
    - cron: '0 18 * * 6'
    # Saturdays at 6 PM ET (22:00 UTC) — last-minute update 1 hour before prelims
    - cron: '0 22 * * 6'
  workflow_dispatch:

jobs:
  fight-night:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # Only pull artifacts from SUCCESSFUL runs — prevents stale model drift
      - name: Restore database
        uses: dawidd6/action-download-artifact@v6
        with:
          name: ufc-oracle-db
          path: data/
          if_no_artifact_found: ignore
          workflow_conclusion: success
        continue-on-error: true

      - name: Install dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r python/requirements.txt

      - name: Send fight-night predictions to Discord
        run: npm run alerts:updated
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          LOG_LEVEL: info
          LOG_FORMAT: json

      - name: Save database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ufc-oracle-db
          path: data/oracle.sqlite
          retention-days: 30
          overwrite: true
