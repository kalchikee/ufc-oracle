name: Fight Night Predictions

on:
  schedule:
    # Run DAILY at 2 PM ET (18:00 UTC) and 6 PM ET (22:00 UTC).
    # The job uses --alert fight-day which checks isFightDay() and only
    # sends to Discord if the event is actually today. Works for any
    # event day (Sat main cards, Wed international, Sun UK, etc).
    - cron: '0 18 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  fight-night:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # Only pull artifacts from SUCCESSFUL runs — prevents stale model drift
      - name: Restore database
        uses: dawidd6/action-download-artifact@v6
        with:
          name: ufc-oracle-db
          path: data/
          if_no_artifact_found: ignore
          workflow_conclusion: success
        continue-on-error: true

      - name: Install dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r python/requirements.txt

      - name: Send fight-night predictions to Discord (only if event is today)
        run: npm run alerts:fight-day
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          LOG_LEVEL: info
          LOG_FORMAT: json

      - name: Save database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ufc-oracle-db
          path: data/oracle.sqlite
          retention-days: 30
          overwrite: true
