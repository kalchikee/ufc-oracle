name: Post-Event Recap

on:
  schedule:
    # Every Sunday at 10AM ET (14:00 UTC) — score predictions, update Elo, send recap
    - cron: '0 14 * * 0'
  workflow_dispatch:

jobs:
  post-event-recap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Restore database
        uses: dawidd6/action-download-artifact@v6
        with:
          name: ufc-oracle-db
          path: data/
          if_no_artifact_found: ignore
          workflow_conclusion: ''
        continue-on-error: true

      - name: Restore ML model
        uses: dawidd6/action-download-artifact@v6
        with:
          name: ufc-oracle-model
          path: model/
          if_no_artifact_found: ignore
          workflow_conclusion: ''
        continue-on-error: true

      - name: Install dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r python/requirements.txt

      - name: Run post-event recap
        run: npm run alerts:recap
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LOG_LEVEL: info
          LOG_FORMAT: json

      # Save DB after Elo updates
      - name: Save updated database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ufc-oracle-db
          path: data/oracle.sqlite
          retention-days: 30
          overwrite: true
