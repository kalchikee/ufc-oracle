name: Fighter DB Update

on:
  schedule:
    # 1st of every month at 6AM ET (10:00 UTC) — keep fighter stats current
    - cron: '0 10 1 * *'
  workflow_dispatch:   # Also manually triggerable
    inputs:
      limit:
        description: 'Max fighters to scrape (leave empty for all ~700 active fighters)'
        required: false
        default: ''

jobs:
  fighter-db-update:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # Scraping all fighters takes ~60–90 min with polite delays

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Restore existing DB to preserve Elo ratings
      - name: Restore database
        uses: dawidd6/action-download-artifact@v6
        with:
          name: ufc-oracle-db
          path: data/
          if_no_artifact_found: ignore
          workflow_conclusion: ''
        continue-on-error: true

      - name: Install dependencies
        run: npm ci

      - name: Scrape fighter database
        run: npm run scrape:fighters
        env:
          LOG_LEVEL: info
          LOG_FORMAT: json

      - name: Save updated fighter database
        uses: actions/upload-artifact@v4
        with:
          name: ufc-oracle-db
          path: data/oracle.sqlite
          retention-days: 30
          overwrite: true
