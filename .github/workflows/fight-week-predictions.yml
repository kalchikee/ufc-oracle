name: Fight Week Predictions

on:
  schedule:
    # Every Monday at 10AM ET (14:00 UTC) — generate predictions and save to DB (no Discord)
    # Thursday workflow picks them up and sends the Discord embed
    - cron: '0 14 * * 1'
  workflow_dispatch:   # Manual trigger for testing

jobs:
  fight-week-predictions:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit predictions/<date>.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # Restore fighter DB + Elo ratings from prior artifact
      - name: Restore database
        uses: dawidd6/action-download-artifact@v6
        with:
          name: ufc-oracle-db
          path: data/
          if_no_artifact_found: ignore
          workflow_conclusion: success
        continue-on-error: true

      # Restore trained model artifacts
      - name: Restore ML model
        uses: dawidd6/action-download-artifact@v6
        with:
          name: ufc-oracle-model
          path: model/
          if_no_artifact_found: ignore
          workflow_conclusion: success
        continue-on-error: true

      - name: Install dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r python/requirements.txt

      - name: Generate and save predictions (no Discord)
        run: npm run pipeline:save
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          KALSHI_MIN_PROB: '0.58'
          LOG_LEVEL: info
          LOG_FORMAT: json

      - name: Commit predictions JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add predictions/*.json || true
          if ! git diff --staged --quiet; then
            git commit -m "UFC predictions fight-week"
            git push
          else
            echo "No predictions file to commit"
          fi

      # Save updated DB (new predictions stored)
      - name: Save database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ufc-oracle-db
          path: data/oracle.sqlite
          retention-days: 30
          overwrite: true
