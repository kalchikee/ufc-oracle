name: Updated Predictions

on:
  schedule:
    # Every Thursday at 10AM ET (14:00 UTC) — re-run with updated odds, late scratches
    - cron: '0 14 * * 4'
  workflow_dispatch:

jobs:
  updated-predictions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore database
        uses: dawidd6/action-download-artifact@v6
        with:
          name: ufc-oracle-db
          path: data/
          if_no_artifact_found: ignore
          workflow_conclusion: ''
        continue-on-error: true

      - name: Restore ML model
        uses: dawidd6/action-download-artifact@v6
        with:
          name: ufc-oracle-model
          path: model/
          if_no_artifact_found: ignore
          workflow_conclusion: ''
        continue-on-error: true

      - name: Install dependencies
        run: npm ci

      - name: Send updated predictions to Discord
        run: npm run alerts:updated
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LOG_LEVEL: info
          LOG_FORMAT: json

      - name: Save database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ufc-oracle-db
          path: data/oracle.sqlite
          retention-days: 30
          overwrite: true
